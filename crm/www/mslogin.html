<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign in - SentimentAI CRM</title>
{% raw %}
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{display:flex;flex-direction:column;justify-content:center;align-items:center;min-height:100vh;background:#0f0f1a;color:#fff;font-family:'Segoe UI',Arial,sans-serif;gap:20px}
.logo{display:flex;align-items:center;gap:12px;margin-bottom:4px}
.logo svg{width:44px;height:44px;flex-shrink:0}
.logo-text{display:flex;flex-direction:column;line-height:1.15}
.logo-name{font-size:19px;font-weight:800;color:#f1f5f9;letter-spacing:-.3px}
.logo-tag{font-size:10px;font-weight:600;letter-spacing:1.8px;text-transform:uppercase;color:#94a3b8;margin-top:1px}
.logo-ai{background:linear-gradient(135deg,#a78bfa,#f472b6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.spinner{width:36px;height:36px;border:3px solid rgba(99,102,241,0.3);border-top-color:#6366f1;border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
p{color:#94a3b8;font-size:14px}
.err{color:#f87171;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.25);padding:14px 20px;border-radius:8px;font-size:13px;text-align:center;max-width:400px;line-height:1.8;word-break:break-word}
.err a{color:#818cf8;text-decoration:none}
.err a:hover{text-decoration:underline}
.btn-ms{display:inline-flex;align-items:center;gap:10px;padding:11px 24px;background:#0078d4;color:#fff;border-radius:4px;font-weight:500;font-size:15px;text-decoration:none;margin-top:8px}
.btn-ms:hover{background:#106ebe}
</style>
{% endraw %}
</head>
<body>
<div class="logo">
  <svg viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect width="44" height="44" rx="12" fill="url(#ms-lg)"/>
    <rect x="1.5" y="1.5" width="41" height="41" rx="10.5" stroke="white" stroke-opacity="0.1" stroke-width="1"/>
    <path d="M11 8H31Q33 8 33 10V22Q33 24 31 24H20L14 30V24H11Q9 24 9 22V10Q9 8 11 8Z" fill="white" fill-opacity="0.18"/>
    <polyline points="10.5,17 13.5,17 15,12 17,22 19,14 21,17 31.5,17" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <line x1="37" y1="6.5" x2="37" y2="11.5" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.9"/>
    <line x1="34.5" y1="9" x2="39.5" y2="9" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.9"/>
    <line x1="35.6" y1="7.1" x2="38.4" y2="10.9" stroke="white" stroke-width="1" stroke-linecap="round" opacity="0.55"/>
    <line x1="38.4" y1="7.1" x2="35.6" y2="10.9" stroke="white" stroke-width="1" stroke-linecap="round" opacity="0.55"/>
    <defs><linearGradient id="ms-lg" x1="0" y1="0" x2="44" y2="44"><stop offset="0%" stop-color="#b197fc"/><stop offset="100%" stop-color="#4c2cbf"/></linearGradient></defs>
  </svg>
  <span class="logo-text">
    <span class="logo-name">Sentiment<span class="logo-ai">AI</span></span>
    <span class="logo-tag">CRM Platform</span>
  </span>
</div>
<div class="spinner" id="spin"></div>
<p id="msg">Redirecting to Microsoft&#8230;</p>
{% raw %}
<script>
var CLIENT_ID  = 'a611bacf-83ed-454e-bfa1-449636df4305';
var TENANT_ID  = '7f94f5fb-b4f9-4f9d-8d0c-dab7cdc1234f';
var REDIRECT   = 'https://sentimentaicrm-app.eastus2.azurecontainer.io/mslogin';

// Force HTTPS — Microsoft OAuth requires a secure origin
if (location.protocol === 'http:' && location.hostname !== 'localhost') {
  location.replace('https://' + location.host + location.pathname + location.search + location.hash);
}

function showError(title, detail, showRetry) {
  document.getElementById('spin').style.display = 'none';
  document.getElementById('msg').style.display  = 'none';
  var d = document.createElement('div');
  d.className = 'err';
  d.innerHTML =
    '<strong>' + title + '</strong><br>' +
    (detail ? '<small style="color:#fca5a5;display:block;margin-top:6px">' + detail + '</small>' : '') +
    '<br>' +
    (showRetry ? '<a class="btn-ms" href="/mslogin" style="margin-top:4px;font-size:13px;padding:8px 18px">' +
      '<svg width=14 height=14 viewBox="0 0 21 21"><path fill="#f25022" d="M0 0h10v10H0z"/><path fill="#7fba00" d="M11 0h10v10H11z"/><path fill="#00a4ef" d="M0 11h10v10H0z"/><path fill="#ffb900" d="M11 11h10v10H11z"/></svg>' +
      'Try again with Microsoft</a><br><br>' : '') +
    '<a href="/login">Return to login page</a>';
  document.body.appendChild(d);
}

// Parse URL fragment returned by Microsoft after login
var hash = location.hash.replace(/^#/, '');
var params = {};
hash.split('&').forEach(function(p) {
  var i = p.indexOf('=');
  if (i > 0) params[p.slice(0, i)] = decodeURIComponent(p.slice(i + 1).replace(/\+/g, ' '));
});

if (params.id_token) {
  // Microsoft returned an id_token — forward to Frappe to create a session
  document.getElementById('msg').textContent = 'Signing you in…';
  // Clear the hash so a back-button press doesn't re-submit the same token
  history.replaceState(null, '', location.pathname);
  window.location.replace(
    '/api/method/crm.api.ms_auth.login_with_token_redirect?id_token=' +
    encodeURIComponent(params.id_token)
  );

} else if (params.error) {
  // Microsoft returned an explicit error
  var desc = params.error_description || params.error;
  var extra = '';
  if (params.error === 'unsupported_response_type' || desc.indexOf('AADSTS70011') >= 0) {
    extra = '<br><small style="color:#fbbf24">Action needed: in Azure Portal → App Registration → Authentication, enable <b>ID tokens</b> under Implicit grant.</small>';
  }
  showError('Microsoft sign-in failed', desc + extra, true);

} else {
  // No token or error — start fresh OAuth redirect to Microsoft (MSAL implicit flow)
  var nonce = Math.random().toString(36).slice(2) + Date.now().toString(36);
  var authUrl =
    'https://login.microsoftonline.com/' + TENANT_ID + '/oauth2/v2.0/authorize' +
    '?client_id='      + encodeURIComponent(CLIENT_ID) +
    '&response_type=id_token' +
    '&redirect_uri='   + encodeURIComponent(REDIRECT) +
    '&scope='          + encodeURIComponent('openid profile email') +
    '&response_mode=fragment' +
    '&nonce='          + encodeURIComponent(nonce) +
    '&prompt=select_account';
  window.location.replace(authUrl);
}
</script>
{% endraw %}
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up with Microsoft | SentimentAI CRM</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #7c5cfc;
            --primary-dark: #5e3af0;
            --secondary: #fc5c7d;
            --dark: #14183e;
            --text: #5d6576;
            --white: #fff;
            --border: #eaeaf5;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #f8f7ff 0%, #ffffff 100%);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: var(--text);
        }

        .login-card {
            background: var(--white);
            padding: 48px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(124, 92, 252, 0.1);
            width: 100%;
            max-width: 440px;
            text-align: center;
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
        }

        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 32px;
        }

        .logo-text {
            font-size: 24px;
            font-weight: 800;
            color: var(--dark);
        }

        .logo-ai {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        h1 {
            font-size: 28px;
            font-weight: 800;
            color: var(--dark);
            margin-bottom: 12px;
        }

        p {
            font-size: 16px;
            margin-bottom: 36px;
            line-height: 1.6;
        }

        .btn-ms {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: #0078d4;
            color: #fff;
            padding: 16px 32px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 16px;
            text-decoration: none;
            transition: all 0.3s;
            box-shadow: 0 8px 24px rgba(0, 120, 212, 0.3);
        }

        .btn-ms:hover {
            background: #106ebe;
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(0, 120, 212, 0.4);
        }

        .btn-ms img {
            width: 24px;
            height: 24px;
        }

        .back-link {
            display: inline-block;
            margin-top: 32px;
            color: var(--primary);
            font-weight: 700;
            text-decoration: none;
            font-size: 14px;
            transition: opacity 0.3s;
        }

        .back-link:hover {
            opacity: 0.8;
        }

        .footer-note {
            margin-top: 48px;
            font-size: 13px;
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">
            <span class="logo-text">Sentiment<span class="logo-ai">AI</span></span>
        </div>
        <h1>Welcome Back</h1>
        <p>Sign in with your Microsoft account to access your intelligent CRM dashboard.</p>
        
        <a href="/api/method/frappe.integrations.oauth2_logins.login_via_oauth2?provider=microsoft" class="btn-ms">
            <svg width="20" height="20" viewBox="0 0 23 23" xmlns="http://www.w3.org/2000/svg">
                <path fill="#f3f3f3" d="M0 0h23v23H0z"/>
                <path fill="#f35325" d="M1 1h10v10H1z"/>
                <path fill="#81bc06" d="M12 1h10v10H12z"/>
                <path fill="#05a6f0" d="M1 12h10v10H1z"/>
                <path fill="#ffba08" d="M12 12h10v10H12z"/>
            </svg>
            Continue with Microsoft
        </a>

        <a href="/" class="back-link">← Back to Home</a>

        <div class="footer-note">
            By continuing, you agree to SentimentAI's <br> Terms of Service and Privacy Policy.
        </div>
    </div>
</body>
</html>

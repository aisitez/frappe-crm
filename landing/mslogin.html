<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign in - SentimentAI CRM</title>
<script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@3/dist/msal-browser.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{display:flex;flex-direction:column;justify-content:center;align-items:center;min-height:100vh;background:#0f0f1a;color:#fff;font-family:'Segoe UI',Arial,sans-serif;gap:20px}
.logo{display:flex;align-items:center;gap:10px;font-size:20px;font-weight:700;margin-bottom:4px}
.logo svg{width:32px;height:32px;flex-shrink:0}
.spinner{width:36px;height:36px;border:3px solid rgba(99,102,241,0.3);border-top-color:#6366f1;border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
p{color:#94a3b8;font-size:14px}
.err{color:#f87171;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.25);padding:12px 20px;border-radius:8px;font-size:14px;text-align:center;max-width:320px;line-height:1.6}
a{color:#818cf8;text-decoration:none}
a:hover{text-decoration:underline}
</style>
</head>
<body>
<div class="logo">
  <svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect width="36" height="36" rx="10" fill="url(#g)"/>
    <path d="M10 18l6 6 10-12" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <defs><linearGradient id="g" x1="0" y1="0" x2="36" y2="36"><stop stop-color="#6366f1"/><stop offset="1" stop-color="#8b5cf6"/></linearGradient></defs>
  </svg>
  SentimentAI CRM
</div>
<div class="spinner" id="spin"></div>
<p id="msg">Redirecting to Microsoft&#8230;</p>
<script>
var msalCfg = {
  auth: {
    clientId: 'a611bacf-83ed-454e-bfa1-449636df4305',
    authority: 'https://login.microsoftonline.com/7f94f5fb-b4f9-4f9d-8d0c-dab7cdc1234f',
    redirectUri: 'https://sentimentaicrm-app.eastus2.azurecontainer.io/mslogin',
    postLogoutRedirectUri: '/',
    navigateToLoginRequestUrl: false
  },
  cache: { cacheLocation: 'sessionStorage', storeAuthStateInCookie: false }
};

async function run() {
  var app = new msal.PublicClientApplication(msalCfg);
  await app.initialize();

  // Handle redirect callback from Microsoft
  var resp = await app.handleRedirectPromise();
  if (resp && resp.idToken) {
    document.getElementById('msg').textContent = 'Signing you in…';
    window.location.replace(
      '/api/method/crm.api.ms_auth.login_with_token_redirect?id_token=' +
      encodeURIComponent(resp.idToken)
    );
    return;
  }

  // Try silent SSO for an existing cached session
  var accounts = app.getAllAccounts();
  if (accounts.length > 0) {
    try {
      var silent = await app.acquireTokenSilent({
        scopes: ['openid', 'profile', 'email'],
        account: accounts[0]
      });
      document.getElementById('msg').textContent = 'Signing you in…';
      window.location.replace(
        '/api/method/crm.api.ms_auth.login_with_token_redirect?id_token=' +
        encodeURIComponent(silent.idToken)
      );
      return;
    } catch (e) { /* fall through to interactive */ }
  }

  // Start interactive Microsoft login
  await app.loginRedirect({
    scopes: ['openid', 'profile', 'email'],
    prompt: 'select_account'
  });
}

run().catch(function(e) {
  console.error(e);
  document.getElementById('spin').style.display = 'none';
  document.getElementById('msg').style.display = 'none';
  var d = document.createElement('div');
  d.className = 'err';
  d.innerHTML = 'Microsoft sign-in failed.<br><a href="/login">Return to login</a>';
  document.body.appendChild(d);
});
</script>
</body>
</html>

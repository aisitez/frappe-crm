name: Build & Push to Azure Container Registry

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "*"

env:
  ACR_REGISTRY: sentimentaicrm.azurecr.io
  IMAGE_NAME: frappecrm

jobs:
  build-and-push:
    name: Build & Push to ACR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Set build variables
        run: |
          APPS_JSON='[{"url": "https://github.com/aisitez/frappe-crm", "branch": "main"}]'
          echo "APPS_JSON_BASE64=$(echo $APPS_JSON | base64 -w 0)" >> $GITHUB_ENV
          echo "FRAPPE_BRANCH=version-15" >> $GITHUB_ENV

      - name: Set image tag
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "IMAGE_TAG=${{ github.ref_name }}" >> $GITHUB_ENV
          else
            echo "IMAGE_TAG=latest" >> $GITHUB_ENV
          fi

      - name: Checkout frappe_docker
        uses: actions/checkout@v4
        with:
          repository: frappe/frappe_docker
          path: frappe_docker

      - name: Build and push to ACR
        uses: docker/build-push-action@v6
        with:
          push: true
          context: frappe_docker
          file: frappe_docker/images/layered/Containerfile
          platforms: linux/amd64
          tags: |
            ${{ env.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            ${{ env.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          build-args: |
            FRAPPE_BRANCH=${{ env.FRAPPE_BRANCH }}
            APPS_JSON_BASE64=${{ env.APPS_JSON_BASE64 }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Azure Container Instance
        if: env.IMAGE_TAG == 'latest'
        run: |
          az login --service-principal \
            -u "${{ secrets.AZURE_CLIENT_ID }}" \
            -p "${{ secrets.AZURE_CLIENT_SECRET }}" \
            --tenant "${{ secrets.AZURE_TENANT_ID }}"
          az account set --subscription "${{ secrets.AZURE_SUBSCRIPTION_ID }}"

          sed -e "s|__ACR_PASSWORD__|${{ secrets.ACR_REGISTRY_PASSWORD }}|g" \
              -e "s|__STORAGE_KEY__|${{ secrets.STORAGE_ACCOUNT_KEY }}|g" \
              -e "s|__DB_ROOT_PASSWORD__|${{ secrets.DB_ROOT_PASSWORD }}|g" \
              .github/aci-deploy-template.yaml > /tmp/aci-deploy.yaml

          az container delete --name frappe-group --resource-group sentimentaicrm --yes || true
          sleep 20
          az container create --resource-group sentimentaicrm --file /tmp/aci-deploy.yaml
          echo "Deployed to: https://sentimentaicrm-app.eastus2.azurecontainer.io/"

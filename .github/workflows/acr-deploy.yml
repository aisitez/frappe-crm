name: Build & Push to Azure Container Registry

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "*"

env:
  ACR_REGISTRY: sentimentaicrm.azurecr.io
  IMAGE_NAME: frappecrm

jobs:
  build-and-push:
    name: Build & Push to ACR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Set build variables
        run: |
          echo '[{"url": "https://github.com/aisitez/frappe-crm", "branch": "main"}]' > /tmp/apps.json
          echo "FRAPPE_BRANCH=version-15" >> $GITHUB_ENV

      - name: Set image tag
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "IMAGE_TAG=${{ github.ref_name }}" >> $GITHUB_ENV
          else
            echo "IMAGE_TAG=latest" >> $GITHUB_ENV
          fi

      - name: Checkout frappe_docker
        uses: actions/checkout@v4
        with:
          repository: frappe/frappe_docker
          path: frappe_docker

      - name: Build and push to ACR
        uses: docker/build-push-action@v6
        with:
          push: true
          context: frappe_docker
          file: frappe_docker/images/layered/Containerfile
          platforms: linux/amd64
          tags: |
            ${{ env.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            ${{ env.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          build-args: |
            FRAPPE_BRANCH=${{ env.FRAPPE_BRANCH }}
            CACHE_BUST=${{ github.sha }}
          secret-files: |
            apps_json=/tmp/apps.json
          no-cache: true

      - name: Deploy to Azure Container Apps
        if: env.IMAGE_TAG == 'latest'
        run: |
          az login --service-principal \
            -u "${{ secrets.AZURE_CLIENT_ID }}" \
            -p "${{ secrets.AZURE_CLIENT_SECRET }}" \
            --tenant "${{ secrets.AZURE_TENANT_ID }}"
          az account set --subscription "${{ secrets.AZURE_SUBSCRIPTION_ID }}"

          az extension add --name containerapp --upgrade -y 2>/dev/null || true

          az containerapp update \
            --name frappecrm-app \
            --resource-group sentimentaicrm \
            --container-name frappecrm-app \
            --image ${{ env.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

          echo "Deployed to: https://frappecrm-app.orangesmoke-bde752a0.eastus.azurecontainerapps.io/"

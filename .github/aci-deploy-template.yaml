apiVersion: 2021-09-01
location: eastus2
name: frappe-group
properties:
  containers:
  - name: redis
    properties:
      environmentVariables: []
      image: sentimentaicrm.azurecr.io/redis:latest
      ports:
      - port: 6379
      resources:
        requests:
          cpu: 0.25
          memoryInGB: 0.5
  - name: mariadb
    properties:
      command:
      - docker-entrypoint.sh
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
      environmentVariables:
      - name: MYSQL_ROOT_PASSWORD
        value: __DB_ROOT_PASSWORD__
      image: sentimentaicrm.azurecr.io/mariadb:10.8
      ports:
      - port: 3306
      resources:
        requests:
          cpu: 0.5
          memoryInGB: 1.0
  - name: nginx
    properties:
      command:
      - /bin/sh
      - -c
      - |
        apk add --no-cache openssl curl 2>&1 | tail -2
        mkdir -p /sites/ssl /sites/landing

        # Generate self-signed cert if not present
        if [ ! -f "/sites/ssl/selfsigned.crt" ]; then
          openssl req -x509 -nodes -days 3650 -newkey rsa:2048 \
            -keyout /sites/ssl/selfsigned.key \
            -out /sites/ssl/selfsigned.crt \
            -subj "/CN=sentimentaicrm-app.eastus2.azurecontainer.io" 2>/dev/null
        fi

        # Download landing page from GitHub (fresh copy of latest)
        echo "==> Downloading landing page..."
        curl -sf "https://raw.githubusercontent.com/aisitez/frappe-crm/main/landing/index.html" \
          -o /sites/landing/index.html 2>/dev/null || echo "==> Warning: could not download landing page"

        # Write nginx config
        cat > /etc/nginx/conf.d/default.conf << 'NGINXEOF'
        server {
          listen 80;
          server_name _;
          location / { return 301 https://$host$request_uri; }
        }

        server {
          listen 443 ssl;
          server_name _;
          ssl_certificate /sites/ssl/selfsigned.crt;
          ssl_certificate_key /sites/ssl/selfsigned.key;
          ssl_protocols TLSv1.2 TLSv1.3;
          client_max_body_size 100M;

          # Serve landing page at root instantly (no Frappe dependency)
          location = / {
            root /sites/landing;
            index index.html;
            try_files /index.html =404;
          }

          # Serve static assets for the landing page
          location ~* ^/(assets/landing|images/landing)/ {
            root /sites;
            expires 7d;
          }

          # Proxy /crm, /api, /assets, /files, /private to Frappe
          location ~ ^/(crm|api|assets|files|private|app|login|logout|web|desk|update-password|print|favicon.ico|manifest.webmanifest|sw.js|registerSW.js|workbox-) {
            proxy_pass http://127.0.0.1:8000;
            proxy_set_header Host crm.localhost;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_read_timeout 300s;
            proxy_connect_timeout 60s;
            proxy_send_timeout 300s;
          }
        }
        NGINXEOF

        echo "==> Starting nginx..."
        exec nginx -g "daemon off;"
      environmentVariables: []
      image: nginx:alpine
      ports:
      - port: 80
      - port: 443
      resources:
        requests:
          cpu: 0.5
          memoryInGB: 0.5
      volumeMounts:
      - mountPath: /sites
        name: frappe-sites-vol
  - name: frappe
    properties:
      command:
      - /bin/bash
      - -c
      - |
        BENCH=/home/frappe/frappe-bench
        cd $BENCH

        echo "==> Waiting for MariaDB..."
        until (echo > /dev/tcp/127.0.0.1/3306) 2>/dev/null; do sleep 2; done
        sleep 3

        echo "==> Waiting for Redis..."
        until (echo > /dev/tcp/127.0.0.1/6379) 2>/dev/null; do sleep 1; done

        bench set-mariadb-host 127.0.0.1 || true
        bench set-redis-cache-host redis://127.0.0.1:6379 || true
        bench set-redis-queue-host redis://127.0.0.1:6379 || true
        bench set-redis-socketio-host redis://127.0.0.1:6379 || true

        # Install CRM app if not present
        if ! bench list-apps 2>/dev/null | grep -q "^crm$"; then
          echo "==> Installing CRM app..."
          bench get-app crm --branch main --skip-assets https://github.com/aisitez/frappe-crm || true
        fi

        # Setup or migrate site
        if mysql -h 127.0.0.1 -uroot -p$DB_ROOT_PASSWORD -e "SHOW DATABASES LIKE 'crm_localhost';" 2>/dev/null | grep -q "crm_localhost"; then
          echo "==> Site exists, migrating..."
          bench --site crm.localhost migrate || true
        else
          echo "==> Creating new site..."
          rm -rf sites/crm.localhost || true
          bench new-site crm.localhost \
            --mariadb-root-password $DB_ROOT_PASSWORD \
            --admin-password admin \
            --mariadb-user-host-login-scope=%
          bench --site crm.localhost install-app crm || true
          bench --site crm.localhost set-config developer_mode 0 || true
          bench --site crm.localhost set-config mute_emails 1 || true
          bench --site crm.localhost set-config allow_signup 1 || true
        fi

        bench use crm.localhost || true
        bench --site crm.localhost set-config allow_signup 1 || true

        # Copy static assets if needed
        mkdir -p sites/assets/frappe
        [ ! -d "sites/assets/frappe/icons" ] && cp -r apps/frappe/frappe/public/icons sites/assets/frappe/icons || true
        [ ! -d "sites/assets/frappe/images" ] && cp -r apps/frappe/frappe/public/images sites/assets/frappe/images || true
        [ ! -d "sites/assets/frappe/css" ] && cp -r apps/frappe/frappe/public/css sites/assets/frappe/css || true
        [ ! -d "sites/assets/frappe/js" ] && cp -r apps/frappe/frappe/public/js sites/assets/frappe/js || true
        [ ! -d "sites/assets/crm" ] && cp -r apps/crm/crm/public sites/assets/crm || true

        # Build assets if needed
        if [ ! -f "sites/assets/assets.json" ]; then
          echo "==> Building bench assets..."
          bench build 2>&1 | tail -5 || true
        fi

        echo "==> Starting Frappe on port 8000..."
        exec bench serve --port 8000 --noreload
      environmentVariables:
      - name: DB_ROOT_PASSWORD
        value: __DB_ROOT_PASSWORD__
      image: sentimentaicrm.azurecr.io/frappecrm:latest
      ports:
      - port: 8000
      resources:
        requests:
          cpu: 2.0
          memoryInGB: 4.0
      volumeMounts:
      - mountPath: /home/frappe/frappe-bench/sites
        name: frappe-sites-vol
  imageRegistryCredentials:
  - password: __ACR_PASSWORD__
    server: sentimentaicrm.azurecr.io
    username: sentimentaicrm
  ipAddress:
    dnsNameLabel: sentimentaicrm-app
    ports:
    - port: 80
      protocol: TCP
    - port: 443
      protocol: TCP
    type: Public
  osType: Linux
  restartPolicy: Always
  sku: Standard
  volumes:
  - azureFile:
      shareName: frappe-sites
      storageAccountKey: __STORAGE_KEY__
      storageAccountName: sentimentaistorage2026
    name: frappe-sites-vol
type: Microsoft.ContainerInstance/containerGroups
